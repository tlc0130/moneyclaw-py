# Crypto DCA — config.yaml
# Customize DCA parameters

coin: bitcoin
symbol: BTC/USDT
amount_usd: 10.0
exchange_id: binanceus
# Failed buys (e.g. InsufficientFunds) wait this long before retrying, and
# stop for the day after max_attempts_per_day — never retry every brain tick.
failed_buy_retry_minutes: 60
max_attempts_per_day: 3
