common:
  # 4h bars trade far more often than daily (a new bar every 4h instead of once/day).
  timeframe: 4h
  lookback: 1500
  start_balance: 1000
  risk_per_trade: 0.015
  max_open_positions: 4
  max_portfolio_risk: 0.06
  fee_rate: 0.001
  slippage_rate: 0.002
  exchange_id: binanceus
  btc_regime_ema: 200
  # Place a native exchange stop-loss on every entry (enforced 24/7, not just on
  # the daily scan). Set false if Binance.US rejects STOP_LOSS_LIMIT for a symbol.
  place_native_stops: true
  stop_limit_buffer: 0.005
  # Run the heavy signal computation at most once per this many seconds. 900 = 15
  # min, responsive enough to catch new 4h bars soon after they close.
  scan_min_interval_seconds: 900

donchian:
  entry_channel: 20  # ~3.3 days of 4h highs (was 55) -> more breakout entries
  exit_channel: 20
  atr_period: 14
  atr_stop_mult: 2.0
  symbols:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - INJ/USDT
    - DYDX/USDT
    - SUI/USDT
    - RNDR/USDT
    - LINK/USDT
    - AVAX/USDT

rsi2:
  rsi_period: 2
  entry: 15  # RSI(2) < 15 (was 5) -> dip entries fire much more often
  # Allow mean-reversion dip-buys even when BTC is below its 200EMA (the per-symbol
  # uptrend filter close>trend_ma still applies). Set true to require BTC bullish.
  require_btc_regime: false
  exit: 70
  low_confirm_lookback: 5
  time_stop_days: 10
  day5_green_check: 5
  trend_ma: 200
  atr_period: 14
  atr_stop_mult: 2.5
  symbols:
    - SOL/USDT
    - INJ/USDT
    - DYDX/USDT
    - GMX/USDT
    - SUI/USDT
    - RNDR/USDT
    - FET/USDT
    - AVAX/USDT
    - NEAR/USDT
