common:
  timeframe: 1d
  lookback: 1500
  start_balance: 1000
  risk_per_trade: 0.015
  max_open_positions: 4
  max_portfolio_risk: 0.06
  fee_rate: 0.001
  slippage_rate: 0.002
  exchange_id: binanceus
  btc_regime_ema: 200
  # Place a native exchange stop-loss on every entry (enforced 24/7, not just on
  # the daily scan). Set false if Binance.US rejects STOP_LOSS_LIMIT for a symbol.
  place_native_stops: true
  stop_limit_buffer: 0.005
  # Daily strategy: run the heavy signal computation at most once per this many
  # seconds (the agent loop ticks far more often). 1800 = every 30 min.
  scan_min_interval_seconds: 1800

donchian:
  entry_channel: 55
  exit_channel: 20
  atr_period: 14
  atr_stop_mult: 2.0
  symbols:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - INJ/USDT
    - DYDX/USDT
    - SUI/USDT
    - RNDR/USDT
    - LINK/USDT
    - AVAX/USDT

rsi2:
  rsi_period: 2
  entry: 5
  exit: 70
  low_confirm_lookback: 5
  time_stop_days: 10
  day5_green_check: 5
  trend_ma: 200
  atr_period: 14
  atr_stop_mult: 2.5
  symbols:
    - SOL/USDT
    - INJ/USDT
    - DYDX/USDT
    - GMX/USDT
